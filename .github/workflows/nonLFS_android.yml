

name: Android CI non LFS

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download assets with wget
      run: |
        mkdir -p app/src/main/assets
        wget -q -O app/src/main/assets/proton-9.0-arm64ec.txz https://github.com/Pipetto-crypto/winlator/raw/refs/heads/winlator_bionic/app/src/main/assets/proton-9.0-arm64ec.txz
        wget -q -O app/src/main/assets/proton-9.0-x86_64.txz https://github.com/Pipetto-crypto/winlator/raw/refs/heads/winlator_bionic/app/src/main/assets/proton-9.0-x86_64.txz
        wget -q -O app/src/main/assets/imagefs.txz https://github.com/Pipetto-crypto/winlator/raw/refs/heads/winlator_bionic/app/src/main/assets/imagefs.txz

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: "Get Short SHA"
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: "Get Version"
      run: echo "VERSION=$(echo $(cat app/build.gradle.kts | grep versionName | cut -d "=" -f 2 | sed "s/\"//g"))" >> $GITHUB_ENV

    - name: "List files"
      run: |
        ls -la app/src/main/assets

    - name: "Create Release"
      uses: softprops/action-gh-release@v2
      with:
        name: "winlator_bionic ${{ env.VERSION }}-(git-${{ env.SHORT_SHA }})"
        tag_name: ${{ env.SHORT_SHA }}
        prerelease: true
        files: ./app/build/outputs/apk/debug/app-debug.apk
